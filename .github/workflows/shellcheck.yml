name: 🔍 ShellCheck

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "fix/**"
    paths:
      - "**.sh"
      - ".github/**"
      - ".gitignore"
  workflow_dispatch:

jobs:
  shellcheck:
    name: Lint Bash scripts
    runs-on: ubuntu-latest
    container:
      image: debian:trixie

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Install ShellCheck
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends shellcheck
          shellcheck --version

      - name: 🔑 Make all scripts executable
        run: |
          chmod +x Hardening_Controller.sh
          chmod +x modules/*.sh
          chmod +x install.sh

      - name: 🔍 Run ShellCheck on all scripts
        run: |
          echo "=== Scanning: Hardening_Controller.sh ==="
          shellcheck Hardening_Controller.sh

          echo "=== Scanning: modules/*.sh ==="
          shellcheck modules/*.sh

          echo "=== Scanning: install.sh ==="
          shellcheck install.sh

      - name: ✅ ShellCheck passed
        run: echo "All scripts passed ShellCheck with no errors."