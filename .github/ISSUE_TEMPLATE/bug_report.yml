name: 🐛 Bug Report
description: Report a bug or unexpected behavior in Hard4U
title: "[Bug]: "
labels: ["bug"]
assignees:
  - N1-gHT

body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug! Please fill in all the fields below to help me investigate and fix the issue as quickly as possible.
        > ⚠️ If you discovered a **security vulnerability**, please do **not** open an Issue. Refer to the [Security Policy](/SECURITY.md) instead.

  - type: dropdown
    id: module
    attributes:
      label: 🧩 Affected Module
      description: Which module is the bug related to?
      options:
        - Hardening_Controller.sh (Master script)
        - Hardening_1-Kernel_FS.sh (Filesystem & Kernel Parameters)
        - Hardening_2-APT.sh (Package Management)
        - Hardening_3-AppArmor.sh (Mandatory Access Control)
        - Hardening_4-Bootloader.sh (Bootloader / GRUB)
        - Hardening_5-Additional_Process.sh (Additional Process Hardening)
        - Hardening_6-Banners.sh (Warning Banners)
        - Hardening_7-GDM.sh (GNOME Display Manager)
        - Hardening_8-Server_Service.sh (Server Services)
        - Hardening_9-Client_Services.sh (Client Services)
        - Hardening_10-Systemd_Timesyncd.sh (Time Synchronization / systemd)
        - Hardening_11-Chrony.sh (Time Synchronization / chrony)
        - Hardening_12-Job_Scheduler.sh (Cron & Job Scheduling)
        - Hardening_13-Network_1.sh (Network Stack Hardening pt.1)
        - Hardening_14-Network_2.sh (Network Stack Hardening pt.2)
        - Hardening_15-Firewall.sh (Firewall / nftables / iptables)
        - Hardening_16-SSH.sh (SSH Server Hardening)
        - Hardening_17-SSH_Conf.sh (SSH Configuration)
        - Hardening_18-Sudo.sh (Sudo & su Restrictions)
        - Hardening_19-PAM_1.sh (PAM Configuration pt.1)
        - Hardening_20-PAM_2.sh (PAM Configuration pt.2)
        - Hardening_21-Accounts.sh (User Accounts & Environment)
        - Hardening_22-Journald.sh (Journald Logging)
        - Hardening_23-Rsyslog.sh (Rsyslog Configuration)
        - Hardening_24-Auditd_1.sh (Auditd Rules pt.1)
        - Hardening_25-Auditd_2.sh (Auditd Rules pt.2)
        - Hardening_26-Auditd_3.sh (Auditd Rules pt.3)
        - Hardening_27-AIDE.sh (File Integrity / AIDE)
        - Hardening_28-System_Access.sh (System Access Controls)
        - Hardening_29-User_Settings.sh (User Environment Settings)
        - Other / Unknown
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: ⚙️ Mode Used
      description: Which flag were you running when the bug occurred?
      options:
        - "--audit"
        - "--remediation"
        - "--auto"
        - Interactive menu (no flag)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 📦 Script Version / Commit
      description: Run `git log --oneline -1` and paste the output here.
      placeholder: "e.g. a1b2c3d feat: add network module"
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: 🖥️ Environment
      description: How are you running the scripts?
      options:
        - Virtual Machine (VM)
        - Bare metal (physical server)
        - Cloud instance (VPS, AWS, GCP, etc.)
        - Container (Docker, LXC, etc.)
        - Other
    validations:
      required: true

  - type: input
    id: os_version
    attributes:
      label: 🐧 Debian Version
      description: Paste the output of `cat /etc/os-release | grep PRETTY_NAME`.
      placeholder: "e.g. PRETTY_NAME=\"Debian GNU/Linux 13 (trixie)\""
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: ✅ Expected Behavior
      description: What did you expect to happen?
      placeholder: "e.g. The module should set the journald Storage to 'persistent'."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: ❌ Actual Behavior
      description: What actually happened instead?
      placeholder: "e.g. The script exited with an error and no changes were applied."
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 🖥️ Terminal Output / Logs
      description: |
        Paste the full terminal output of the script run.
        Tip: you can enable debug mode with `sudo SCRIPT_DEBUG=true bash ./modules/<module>.sh --audit`
      render: shell
      placeholder: |
        $ sudo ./modules/Hardening_22-Journald.sh --audit
        ...
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 📝 Additional Context
      description: Any other information that might help? (config changes, recent system updates, etc.)
    validations:
      required: false